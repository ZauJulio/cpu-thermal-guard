# /etc/cpu-thermal-guard.conf
# Configuration for CPU Thermal Guard.
# Uncomment and edit values as needed. Lines are KEY=VALUE.

# --- Trigger band ---
# Arm temperature (Celsius). The sustain timer starts once this is crossed.
THRESHOLD=87.5
# Tolerance up/down (Celsius). Dips down to THRESHOLD-VARIANCE do not disarm.
VARIANCE=2.5
# Continuous time (seconds) inside the hot band before the fan activates.
SUSTAIN_SECONDS=10

# --- Timing ---
# Idle poll interval (seconds).
POLL_INTERVAL=2
# Initial fan burst duration (seconds).
BURST_SECONDS=15
# Cool-down wait before re-checking temperature (seconds).
SETTLE_SECONDS=15
# Seconds added to the burst on each escalation cycle while still hot.
ESCALATION_SECONDS=30

# --- Integration ---
# NBFC binary (the daemon runs as root, so no sudo).
NBFC_BIN=nbfc

# Override the sensor path (leave empty for auto-detect: coretemp Package id 0).
# TEMP_INPUT=/sys/class/hwmon/hwmon3/temp1_input

# Log verbosity: DEBUG, INFO, WARNING, ERROR.
LOG_LEVEL=INFO
